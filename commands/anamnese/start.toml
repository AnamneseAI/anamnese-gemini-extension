description = "Onboard and authenticate with Anamnese, check connected MCPs, and bootstrap your personal profile"

[prompt]
text = """Follow these steps to get the user set up with Anamnese:

## Step 1: Authenticate

Call `get_user_profile` to check if Anamnese is authenticated.

- **If it returns a 401 or auth error:** Tell the user that authentication is required. Anamnese uses OAuth — ask them to restart the extension so the browser-based login flow can complete. Once authenticated, try again.
- **If it succeeds:** Continue to Step 2.

## Step 2: Check Integrations

Check which integrations are connected by attempting to use them:
- **Calendar:** Try calling a Google Calendar tool. Note whether calendar is available.
- **Gmail:** Try calling a Gmail tool. Note whether Gmail is available.
- **Microsoft 365:** Try calling an MS365 tool. Note whether MS365 is available.

Report which integrations are connected and which aren't.

## Step 3: Assess Profile Richness

Look at the profile data returned from `get_user_profile`:
- Count the number of facts stored
- Check if goals exist
- Check if tasks exist

**If the profile has >= 5 facts:** Skip to Step 5 (Orientation).

**If the profile is sparse (< 5 facts):** Continue to Step 4.

## Step 4: Get to Know You

Run a friendly "get to know you" conversation. Ask about:

1. **Name and life situation** -- "What's your name? Tell me a bit about yourself."
2. **Goals and aspirations** -- "What are your main goals right now -- personal, professional, or otherwise?"
3. **Daily routines** -- "What does a typical day look like for you?"
4. **Interests** -- "What are you most interested in or working on lately?"

Save all answers using the appropriate tools:
- Personal details -> `save_memory` (type: "fact")
- Goals -> `save_goal`
- Routines/patterns -> `save_memory` (type: "fact")

Don't ask all questions at once. Have a natural conversation, ask 2-3 questions at a time, and save as you go.

## Step 5: Orientation

Show the user what's available:

**Available commands:**
- `/anamnese:start` -- This onboarding flow (re-run anytime)

**Capabilities (active automatically as you chat):**
- **Memory** -- Facts, moments, and notes are captured proactively
- **Tasks** -- One-off and recurring task management with priorities and deadlines
- **Goals** -- Long-term objective tracking
- **Self-learning** -- The AI learns from corrections and gets better over time

**Self-learning:** Explain that the AI learns from corrections. When the user corrects something -- a tool preference, communication style, coding approach -- the AI remembers and applies it in future conversations. Over time, the AI gets better at anticipating what the user wants. The user can say "review your learnings" at any time to see what the AI has learned.

**Tips:**
- Anamnese remembers across all your AI apps (Claude, ChatGPT, Claude Code, Cursor, Gemini) and devices
- Just chat naturally -- proactive capture saves important details automatically
- Correct the AI when it gets something wrong -- it will learn and improve
"""
